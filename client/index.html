    <!-- =========================================================
         CRITICAL INLINE CSS
         Renders a branded loading mark before React hydrates.
         When React renders into #root, the :empty selector stops
         matching and the loading state disappears automatically.
         No JS, no flash, no layout shift.
         ========================================================= -->
    <style>
      html, body {
        margin: 0;
        padding: 0;
        background: #fafaf7;
        color: #1a1a1a;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        text-rendering: optimizeLegibility;
      }
      body {
        font-family: "Manrope", "IBM Plex Sans", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        min-height: 100vh;
      }
      #root:empty::before {
        content: "";
        position: fixed;
        inset: 0;
        background:
          radial-gradient(circle at top left, rgba(199, 146, 54, 0.06), transparent 30%),
          radial-gradient(circle at bottom right, rgba(29, 73, 58, 0.08), transparent 38%),
          #fafaf7;
        z-index: 0;
        pointer-events: none;
      }
      #root:empty::after {
        content: "Energie Teilen";
        position: fixed;
        inset: 0;
        display: grid;
        place-items: center;
        font-family: "Manrope", system-ui, sans-serif;
        font-weight: 700;
        font-size: 1.25rem;
        letter-spacing: -0.02em;
        color: #1d493a;
