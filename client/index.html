         ========================================================= -->

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="dns-prefetch" href="https://fonts.googleapis.com" />

    <!-- =========================================================
         STRUCTURED DATA (JSON-LD)
         Helps Google show a richer result and feeds AI knowledge
         panels. No prices included — pricing stays server-side.
         ========================================================= -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Organization",
        "name": "Energie Teilen",
        "url": "https://energie-teilen-site.vercel.app",
        "logo": "https://energie-teilen-site.vercel.app/og-image.png",
        "description": "Strukturierte Pilotaufnahme für lokale Energieprojekte: Mieterstrom, §42b EnWG, gemeinschaftliche Gebäudeversorgung.",
        "areaServed": {
          "@type": "Country",
          "name": "Deutschland"
        },
        "knowsAbout": [
          "Mieterstrom",
          "§42b EnWG",
          "Energy Sharing",
          "Gemeinschaftliche Gebäudeversorgung",
          "Photovoltaik Wirtschaftlichkeit",
          "Quartiersversorgung",
          "Solarspitzengesetz",
          "Eigenverbrauchsoptimierung"
        ],
        "contactPoint": {
          "@type": "ContactPoint",
          "contactType": "customer service",
          "email": "vincenzo.grimaldi.engineering@gmail.com",
          "areaServed": "DE",
          "availableLanguage": ["German"]
        },
        "address": {
          "@type": "PostalAddress",
          "addressLocality": "Frankfurt am Main",
          "addressCountry": "DE"
        }
      }
    </script>

    <script type="application/ld+json">
      {

        "name": "Energie Teilen",
        "url": "https://energie-teilen-site.vercel.app",
        "inLanguage": "de-DE",
        "publisher": { "@type": "Organization", "name": "Energie Teilen" }
      }
    </script>

    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Service",
        "serviceType": "Strukturierte Pilotaufnahme für Energieprojekte",
        "provider": { "@type": "Organization", "name": "Energie Teilen" },
        "areaServed": { "@type": "Country", "name": "Deutschland" },
        "audience": {
          "@type": "BusinessAudience",
          "audienceType": "Bestandshalter, Projektentwickler, Genossenschaften, Stadtwerke, kommunale Akteure"
        },
        "hasOfferCatalog": {
          "@type": "OfferCatalog",
          "name": "Pilotstufen",
          "itemListElement": [
            {
              "@type": "Offer",
              "itemOffered": {
                "@type": "Service",
                "name": "Pilot Eligibility Check",
                "description": "Schnellste bezahlte Einordnung für Standorte, Gebäude und erste Betreiberkonstellationen."
              }
            },
            {
              "@type": "Offer",
              "itemOffered": {
                "@type": "Service",
                "name": "Pilot Structuring Package",
                "description": "Vertiefte Strukturierungsstufe für Projekte mit mehreren Rollen, Dokumenten und Entscheidungsanforderungen."
              }
            },
            {
              "@type": "Offer",
              "itemOffered": {
                "@type": "Service",
                "name": "Full Pilot Preparation Mandate",
                "description": "Intensivste Stufe für Portfolios und Vorhaben mit höherer Verbindlichkeit und Umsetzungsnähe."
              }
            }
          ]
        }
      }

  <body>
    <div id="root"></div>
    <noscript>
      <p style="padding: 2rem; text-align: center; font-family: sans-serif">
        Diese Anwendung benötigt JavaScript. Bitte aktivieren Sie JavaScript in Ihrem Browser.
      </p>
    </noscript>

    <script type="module" src="/src/main.tsx"></script>

    <!-- =========================================================
         ANALYTICS — Umami (preserved from previous config).
         VITE_ANALYTICS_ENDPOINT + VITE_ANALYTICS_WEBSITE_ID are
         replaced at build time. Leave the env vars empty in dev
         and Vite will simply not load the script.
         ========================================================= -->
    <script
      defer
      src="%VITE_ANALYTICS_ENDPOINT%/umami"
      data-website-id="%VITE_ANALYTICS_WEBSITE_ID%"></script>
  </body>
</html>
